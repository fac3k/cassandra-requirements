version: '3.8'
services:
  cassandra-seed:
    image: cassandra:4.1
    container_name: cassandra-seed
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=RequirementsCluster
      - CASSANDRA_DC=DC1
      - CASSANDRA_RACK=RACK1
    networks:
      - cassandra-net

  cassandra-node1:
    image: cassandra:4.1
    container_name: cassandra-node1
    ports:
      - "9043:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=RequirementsCluster
      - CASSANDRA_DC=DC1
      - CASSANDRA_RACK=RACK2
      - CASSANDRA_SEEDS=cassandra-seed
    depends_on:
      - cassandra-seed
    networks:
      - cassandra-net

  cassandra-node2:
    image: cassandra:4.1
    container_name: cassandra-node2
